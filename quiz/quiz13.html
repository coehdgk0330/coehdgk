<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin:0px;
            padding:0px;
            box-sizing:border-box;
        }
        .container{
            width:800px;
            height:500px;
            margin:0 auto;
        }
        .header{
            display:flex;
        }
        .header-1{
            width:50%;
            height:100px;
            background-color: yellow;
        }
        .header-2{
            width:50%;
            height:100px;
            background-color: gray;
        }
        .main{
            width:100%;
            height:100px;
            background-color: blue;
        }
        .section{
            display:flex;
        }

        .section-1{
            width:40%;
            height:200px;
            background-color: lightblue;
        
        }
        .section-2{
            width:60%;
            height:200px;
        }
        .section-3{
            background-color: yellow;
            height:50%;
            width:100%;
        }
        .section-4{
            background-color: aqua;
            height:50%;
            width:100%;
        }
        .footer{
            display:flex;
            
            
        }

        

        

        .footer-1{
            background-color: red;
            height:100px;
            width:25%;
        }
        .footer-2{
            background-color: black;
            height:100px;
            width:25%;

            
            

        }
        .footer-3{
            background-color: lightcoral;
            height:100px;
            width:25%;


        }
        .footer-4{
            background-color: lightseagreen;
            height:100px;
            width:25%;


        }

        @media screen and (max-width:700px){
            .container{
                width:100%;
            }
        }
        @media screen and (max-width:650px){
            .footer-1, .footer-2, .footer-3, .footer-4{
                width:50%;

            }
            .footer{
                flex-wrap:wrap;
            }
            
        }
        @media screen and (max-width:500px){
            .header{
                flex-direction: column;
            }
            .header-1, .header-2{
                width:100%;
            }
            .section{
                display:flex;
                flex-direction: column;
            }
            .section-1{
                width:100%;
                height:100px;

            }
            .section-2{
                display:flex;
                width:100%;
                height:100px;
            }
            .section-3, .section-4{
                height:100px;
            }
            
        @media screen and (max-width:350px){
            .section-2{
                flex-direction: column;
                height:200px;
                

            }
            .section-3, .section-4{
                width:100%;
            }
            .footer{
                flex-direction: column;
            }

            .footer-1, .footer-2, .footer-3, .footer-4{
                width:100%;

            }
            
        }
        }
            


        


    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-1"></div>
            <div class="header-2"></div>
        </div>
        
        <div class="main"></div>


        <div class="section">
            <div class="section-1"></div>
            <div class="section-2">
                <div class="section-3"></div>
                <div class="section-4"></div>
            </div>
        </div>
        
        <div class="footer">
            <div class="footer-1"></div>
            <div class="footer-2"></div>
            <div class="footer-3"></div>
            <div class="footer-4"></div>
            
        </div>
    </div>
</body>
</html>
