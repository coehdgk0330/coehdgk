<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .signup-modal {
            background: white;
            width: 400px;
            padding: 40px;
            border-radius: 8px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 20px;
            cursor: pointer;
            color: lightgray;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid white;
            margin-bottom: 25px;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            color: lightgray;
        }

        .tab.active {
            color: lightblue;
            border-bottom: 2px solid lightblue;
            font-weight: bold;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: black;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid lightgray;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            font-size: 12px;
            color: #666;
            margin-top: 20px;
        }

        .checkbox-group input {
            margin-right: 8px;
        }

        .signup-btn {
            width: 100%;
            padding: 15px;
            background-color: rgb(89, 189, 223);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .sns-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: rgb(89, 189, 223);
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="signup-modal">
    <span class="close-btn">×</span>
    <h2>지금 가입하시면<br>웰컴쿠폰을 드려요!</h2>
    
    <div class="tabs">
        <div class="tab">로그인</div>
        <div class="tab active">회원가입</div>
    </div>

    <div class="input-group">
        <label>이메일</label>
        <input type="email" placeholder="이메일을 입력해주세요.">
    </div>

    <div class="input-group">
        <label>이름 / 업체명</label>
        <input type="text" placeholder="2자 이상 20자 이하">
    </div>

    <div class="input-group">
        <label>비밀번호</label>
        <input type="password" placeholder="영문 숫자 특수문자 조합 8-16자리">
    </div>

    <div class="input-group">
        <label>비밀번호 확인</label>
        <input type="password" placeholder="비밀번호를 다시 입력해주세요.">
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="terms">
        <label for="terms">개인정보수집이용안내 및 약관에 동의 합니다</label>
    </div>

    <button class="signup-btn">회원 가입하기</button>
    
    <a href="#" class="sns-link">SNS로 간편하게 가입하기</a>
</div>

</body>
</html>
