<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table,
        th,
        td {
            border: 1px solid black;
            border-collapse: collapse;
        }

        .color-red {
            color: red
        }

        .color-blue {
            color: blue
        }
    </style>
</head>
<!-- 상속 적용보다는 직접 적용이 더 우선순위가 높음 -->

<body>
    <table>
        <tr class="color-blue">
            <th>순번</th>
            <th>아이디</th>
            <th>이름</th>
        </tr>
        <tr class="color-red">
            <td class="color-red">1</td>
            <td>apple12</td>
            <td>유재석</td>
        </tr>
        <tr>
            <td>2</td>
            <td>orange5</td>
            <td>강호동</td>
        </tr>
        <tr class="color-red">
            <td>3</td>
            <td>freshwater</td>
            <td>신동엽</td>
        </tr>
        <tr>
            <td>4</td>
            <td>takcard</td>
            <td>탁재훈</td>
        </tr>
        <tr class="color-red">
            <td>5</td>
            <td>lognyeon</td>
            <td>장도연</td>
        </tr>

    </table>
</body>

</html>
