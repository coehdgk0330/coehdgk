<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
    .box{
        width:100px;
        height:100px;
        border:1px solid black;
        transition-duration: 2s;
    }

    .container{
        width:400px;
        height:400px;
        background-color: lightgray;
        margin:5px;
    }

    .container:hover .red-box{
        transform:scalex(4);
    }
    .container:hover .blue-box{
        background-color:purple;
    }
    .container:hover .black-box{
        margin-left:200px;
    }
    .green-box:hover{
        border:10px solid red;
    }
    .yellow-box:hover{
        border:10px solid red;
    }
    
    .red-box{
        background-color: red;
        display:flex;
        flex-direction:row;
        transform-origin: left;
        border:1px solid black;

    }
    
    .blue-box{
        background-color: blue;
    }
    
    .black-box{
    
        background-color: black;
    }
    
    .green-box{

        background-color: green;
        display:inline-block;
    }
    
    .yellow-box{
    
        background-color: yellow;
        display:inline-block;

    }


    </style>
</head>
    
<body>
    <div class="container">
        <div class="box red-box"></div>
        <div class="box blue-box"></div>
        <div class="box black-box"></div>
        <div class="box green-box"></div><div class="box yellow-box"></div>
    </div>
</body>
</html>
