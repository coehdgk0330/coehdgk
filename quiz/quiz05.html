<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{margin:0;
        padding:0;
        box-sizing:border-box;
    }
    .box {
        width:500px;
        margin:0 auto;
        margin-top: 50px;
        
    }
    .red-box {
        width:250px;
        height:100px;
        /* border:1px solid red */
        background-color: red;
        

        float:left
    }
    .green-box {
        width:250px;
        height:100px;
        /* border:1px solid green */
        background-color: green;
        float:left
        
    }
    p{
        text-align:center;
    }
    .blue-box {
        width:500px;
        height:200px;
        background-color:blue;
    }
    .box::after{
        content:"";
        display:block;
        clear:both;
    }

    </style>
</head>
<body>
    <div class="box">
        <div class="red-box"></div>
        <div class="green-box"></div>
        <p>글자가운데정렬</p>
        <div class="blue-box"></div>
        
    </div>
</body>
</html>
