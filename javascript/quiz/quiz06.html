<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .dal{
            display:flex;
        }
    </style>





        
</head>
<body>
    <div class="dal">
    <p>달식당 좋아요</p> 
    <p id ="heart">♡</p>
    <p id ="num">0</p>
</div>
    <script>
        const heart = document.getElementById('heart');
        const num = document.getElementById('num');

        let count=0;

        heart.addEventListener("click", () =>{
            count = count + 1;

            num.innerText = count;

        });

        
    </script>
    


    
</body>
</html>
